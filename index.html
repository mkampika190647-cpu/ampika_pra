<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMPIKA PRATUMTONG | Portfolio</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=IBM+Plex+Sans+Thai&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif; }
        .glass-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>

<body class="bg-[#020617] text-slate-200">

<!-- ================= HEADER ================= -->
<header class="pt-20 pb-16 text-center max-w-5xl mx-auto px-6">
    <img src="https://raw.githubusercontent.com/mkampika190647-cpu/image/main/profile.jpg"
         class="w-48 h-48 mx-auto rounded-3xl mb-6 object-cover">

    <h1 class="text-5xl font-black mb-4">AMPIKA PRATUMTONG</h1>

    <p class="text-slate-400 max-w-xl mx-auto">
        Aspiring Data Analyst skilled in SQL, Excel, Python, and Machine Learning.
    </p>

    <div class="mt-6 flex justify-center gap-4 flex-wrap">
        <a href="https://github.com/mkampika190647-cpu" target="_blank"
           class="px-5 py-2 bg-white/10 rounded-xl">GitHub</a>

        <a href="mailto:6610210813@psu.ac.th"
           class="px-5 py-2 bg-blue-600 rounded-xl">Contact</a>
    </div>
</header>

<!-- ================= PROJECTS ================= -->
<section class="max-w-6xl mx-auto px-6 mb-24">

    <h2 class="text-3xl font-bold mb-10 text-center">
        📊 Projects
    </h2>

    <div id="projects" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</section>

<!-- ================= SCRIPT ================= -->
<script>

/* ================= DATA ================= */
const PROJECTS = [
{ id: 1, title: "Multivariate Analysis on Environment & Transport", category: "Statistics", description: "ศึกษาความสัมพันธ์ระหว่าง GHG และโครงสร้างพื้นฐาน", tags:["R"] , url:"https://github.com/mkampika190647-cpu/multivariate-environment-analysis"},
{ id: 2, title: "Global Literacy Rate Analysis (1970–2024)", category: "Statistics", description: "วิเคราะห์อัตราการรู้หนังสือ", tags:["Python"], url:"https://github.com/mkampika190647-cpu/global-literacy-analysis"},
{ id: 3, title: "Electricity Demand Forecasting in Southern Thailand", category: "Predictive", description: "พยากรณ์ความต้องการไฟฟ้า", tags:["Time Series"], url:"https://github.com/mkampika190647-cpu/electricity-demand-forecasting"},
{ id: 4, title: "Household Income Survey", category: "Statistics", description: "สำรวจรายได้ครัวเรือน", tags:["Survey"], url:"https://github.com/mkampika190647-cpu/household-income-survey"},
{ id: 5, title: "Electricity Billing Calculator", category: "Programming", description: "คำนวณค่าไฟ", tags:["Python"], url:"https://github.com/mkampika190647-cpu/electricity-billing-calculator"},
{ id: 6, title: "Term Deposit Prediction", category: "ML", description: "ทำนายการสมัครเงินฝาก", tags:["ML"], url:"https://github.com/mkampika190647-cpu/term-deposit-prediction"},
{ id: 7, title: "Netflix Dashboard", category: "Visualization", description: "Dashboard วิเคราะห์ Netflix", tags:["Tableau"], url:"https://github.com/mkampika190647-cpu/netflix-dashboard"},
{ id: 8, title: "Web Data Management System", category: "Engineering", description: "ระบบฐานข้อมูล", tags:["SQL"], url:"https://github.com/mkampika190647-cpu/web-data-management-dashboard"}
];

/* ================= RENDER ================= */
function renderProjects() {
    const container = document.getElementById("projects");

    PROJECTS.forEach(p => {
        container.innerHTML += `
            <div class="glass-card p-6 rounded-2xl hover:scale-105 transition">
                <h3 class="text-lg font-bold mb-2">${p.title}</h3>

                <p class="text-slate-400 text-sm mb-4">
                    ${p.description}
                </p>

                <div class="flex gap-2 mb-4 flex-wrap">
                    ${p.tags.map(t => `<span class="text-xs bg-white/10 px-2 py-1 rounded">${t}</span>`).join("")}
                </div>

                <a href="${p.url}" target="_blank"
                   class="text-blue-400 text-sm underline">
                   View Project →
                </a>
            </div>
        `;
    });
}

/* ================= INIT ================= */
renderProjects();

</script>

</body>
</html>
